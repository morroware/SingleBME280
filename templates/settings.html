<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Settings</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { margin: 20px; }
        .form-group { margin-bottom: 1.5rem; }
        .btn-group-custom { margin-top: 1rem; }
        .btn-group-custom .btn { margin-right: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Sensor Settings</h1>
        <form action="/settings" method="post" id="settingsForm">
            {% for key, value in settings.items() %}
            <div class="form-group">
                <label for="{{ key }}">{{ key.replace("_", " ").title() }}</label>
                {% if key == 'SENSOR_TYPE' %}
                <select class="form-control" id="{{ key }}" name="{{ key }}">
                    <option value="auto" {% if value == 'auto' %}selected{% endif %}>Auto-detect</option>
                    <option value="bme280" {% if value == 'bme280' %}selected{% endif %}>BME280</option>
                    <option value="scd40" {% if value == 'scd40' %}selected{% endif %}>SCD40</option>
                </select>
                {% else %}
                <input type="text" class="form-control" id="{{ key }}" name="{{ key }}" value="{{ value }}">
                {% endif %}
            </div>
            {% endfor %}
            <div class="btn-group-custom">
                <button type="submit" name="action" value="save" class="btn btn-primary">Save</button>
                <button type="submit" name="action" value="reboot" class="btn btn-warning">Save and Reboot</button>
            </div>
        </form>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
